<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Una Carta Para Ti ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Tipografías -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@400;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/letter.css">

</head>

<body>

<div id="background"></div>
<div id="cursorGlow"></div>

<section class="letterPage">

    <div class="paper">

        <div class="paper-header">

            <span>29 de junio de 2026</span>

            <h1>Para mi diseñadora favorita </h1>

        </div>

        <div id="letterText"></div>

        <div class="signature">

            <p>Con todo mi amor,</p>

            <h2>Pollito ❤️</h2>

        </div>

    </div>

    <div class="photoFrame">

        <img src="img/nosotros.jpeg" alt="Nosotros">

        <p>
            "Mi fotografía favorita."
        </p>

    </div>

</section>

<div class="buttonArea">

    <button id="finish">

        La última sorpresa →

    </button>

</div>

<script src="js/main.js"></script>
<script src="js/letter.js"></script>

</body>

</html>
