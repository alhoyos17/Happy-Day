<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nuestros Recuerdos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gallery.css">

</head>

<body>

<div id="background"></div>
<div id="cursorGlow"></div>

<section class="galleryPage">

    <div class="title">

        <span>NUESTROS RECUERDOS</span>

        <h1>Cada fotografía guarda un pedacito de nosotros.</h1>

    </div>

    <div class="gallery">

        <div class="photo p1">

            <img src="img/foto5.jpeg">

            <div class="message">

                Aquí comenzó todo ❤️

            </div>

        </div>

        <div class="photo p2">

            
            <img src="img/foto6.jpeg">

            <div class="message">

                Mi mirada favorita.

            </div>

        </div>

        <div class="photo p3">

            <img src="img/foto7.jpeg">

            <div class="message">

                Porque cualquier lugar contigo es especial.

            </div>

        </div>

        <div class="photo p4">

            <img src="img/foto8.jpeg">

            <div class="message">

                Tu haces mis dias unicos.

            </div>

        </div>

        <div class="photo p5">

            <img src="img/foto9.jpeg">

            <div class="message">

                Nunca olvidaré este día.

            </div>

        </div>

        <div class="photo p6">

            <img src="img/foto10.jpeg">

            <div class="message">

                Gracias por existir.

            </div>

        </div>

    </div>

    <button id="nextGallery">

        Continuar →

    </button>

</section>

<script src="js/main.js"></script>
<script src="js/gallery.js"></script>

</body>

</html>
