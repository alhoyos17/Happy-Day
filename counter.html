<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nuestras Estadísticas ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/counter.css">

</head>

<body>

<div id="background"></div>
<div id="cursorGlow"></div>

<section class="dashboard">

    <div class="dashboard-title">

        <span>RELATIONSHIP ANALYTICS</span>

        <h1>Nuestro proyecto en números</h1>

        <p>
            Hay cosas que se pueden medir...
            y otras que simplemente son infinitas.
        </p>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <div class="icon">❤️</div>
            <div class="number" id="daysCounter">0</div>
            <div class="label">Días Juntos</div>
        </div>

        <div class="stat-card">
            <div class="icon">📸</div>
            <div class="number" id="photoCounter">0</div>
            <div class="label">Fotos Compartidas</div>
        </div>

        <div class="stat-card">
            <div class="icon">✈️</div>
            <div class="number" id="travelCounter">0</div>
            <div class="label">Viajes</div>
        </div>

        <div class="stat-card">
            <div class="icon">🎥</div>
            <div class="number" id="coffeeCounter">0</div>
            <div class="label">Cine</div>
        </div>

        <div class="stat-card">
            <div class="icon">😊</div>
            <div class="number">∞</div>
            <div class="label">Sonrisas</div>
        </div>

        <div class="stat-card featured">

            <h2>

                Mejor Proyecto

            </h2>

            <p>

                Tú ❤️

            </p>

        </div>

    </div>

    <button id="nextCounter">

        Leer una carta →

    </button>

</section>

<script src="js/main.js"></script>
<script src="js/counter.js"></script>

</body>

</html>
